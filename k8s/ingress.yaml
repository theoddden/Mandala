apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mandala-ingress
  namespace: mandala
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - mandala.yourdomain.com
    secretName: mandala-tls
  rules:
  - host: mandala.yourdomain.com
    http:
      paths:
      - path: /webhooks/samsara
        pathType: Prefix
        backend:
          service:
            name: mandala-api
            port:
              number: 8000
