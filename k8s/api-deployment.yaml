apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandala-api
  namespace: mandala
  labels:
    app: mandala-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mandala-api
  template:
    metadata:
      labels:
        app: mandala-api
    spec:
      containers:
      - name: api
        image: theoddden/mandala:latest
        ports:
        - containerPort: 8000
        env:
        - name: MANDALA_REDIS_URL
          value: "redis://redis:6379/0"
        - name: MANDALA_SAMSARA_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: mandala-secrets
              key: samsara-webhook-secret
        - name: MANDALA_SAMSARA_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: mandala-secrets
              key: samsara-api-token
        - name: MANDALA_SAMSARA_OUTBOUND_ENABLED
          value: "1"
        - name: MANDALA_ALERT_ROUTING_ENABLED
          value: "0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mandala-api
  namespace: mandala
spec:
  selector:
    app: mandala-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
