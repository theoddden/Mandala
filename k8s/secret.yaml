apiVersion: v1
kind: Secret
metadata:
  name: mandala-secrets
  namespace: mandala
type: Opaque
stringData:
  # Samsara webhook secret (shared secret configured in Samsara webhook UI)
  samsara-webhook-secret: "your-samsara-webhook-secret-here"
  
  # Samsara API token (for outbound integration)
  samsara-api-token: "your-samsara-api-token-here"
  
  # Optional: Slack webhook URL for alert routing
  # alert-slack-webhook-url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  
  # Optional: SMTP settings for email alerts
  # alert-smtp-user: "your-smtp-user"
  # alert-smtp-password: "your-smtp-password"
  
  # Optional: PagerDuty routing key
  # alert-pagerduty-routing-key: "your-pagerduty-routing-key"
  
  # Optional: DAT One credentials
  # dat-client-id: "your-dat-client-id"
  # dat-client-secret: "your-dat-client-secret"
  
  # Optional: Truckstop credentials
  # truckstop-integration-id: "your-truckstop-integration-id"
  # truckstop-username: "your-truckstop-username"
  # truckstop-password: "your-truckstop-password"
  
  # Optional: Vizion API key
  # vizion-api-key: "your-vizion-api-key"
