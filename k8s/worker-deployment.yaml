apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandala-worker
  namespace: mandala
  labels:
    app: mandala-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mandala-worker
  template:
    metadata:
      labels:
        app: mandala-worker
    spec:
      containers:
      - name: worker
        image: theoddden/mandala:latest
        command: ["mandala", "worker"]
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: MANDALA_REDIS_URL
          value: "redis://redis:6379/0"
        - name: MANDALA_SAMSARA_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: mandala-secrets
              key: samsara-api-token
        - name: MANDALA_SAMSARA_OUTBOUND_ENABLED
          value: "1"
        - name: MANDALA_ALERT_ROUTING_ENABLED
          value: "0"
        - name: MANDALA_ALERT_AGGREGATION_ENABLED
          value: "1"
        - name: MANDALA_METRICS_ENABLED
          value: "1"
        - name: MANDALA_METRICS_PORT
          value: "9090"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
