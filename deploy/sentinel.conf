# Redis Sentinel configuration for Mandala
# Monitors the redis master and handles automatic failover

port 26379
dir /tmp

# Monitor the redis master
# sentinel monitor <master-name> <host> <port> <quorum>
sentinel monitor mymaster redis 6379 1

# Failover timeout in milliseconds
sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 10000

# Sentinel notification script (optional)
# sentinel notification-script mymaster /var/redis/notify.sh

# Sentinel client-reconfig-script (optional)
# sentinel client-reconfig-script mymaster /var/redis/reconfig.sh
