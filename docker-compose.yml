services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports: ["8000:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api]

  api:
    build: .
    command: ["uvicorn", "mandala.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_SAMSARA_WEBHOOK_SECRET: ${MANDALA_SAMSARA_WEBHOOK_SECRET:-dev-secret}
      MANDALA_DESCARTES_WEBHOOK_SECRET: ${MANDALA_DESCARTES_WEBHOOK_SECRET:-dev-secret}
      MANDALA_SAMSARA_API_TOKEN: ${MANDALA_SAMSARA_API_TOKEN:-}
      MANDALA_SAMSARA_OUTBOUND_ENABLED: ${MANDALA_SAMSARA_OUTBOUND_ENABLED:-0}
      MANDALA_DESCARTES_API_KEY: ${MANDALA_DESCARTES_API_KEY:-}
    depends_on:
      redis: { condition: service_healthy }

  worker:
    build: .
    command: ["mandala", "worker"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_SAMSARA_API_TOKEN: ${MANDALA_SAMSARA_API_TOKEN:-}
      MANDALA_SAMSARA_OUTBOUND_ENABLED: ${MANDALA_SAMSARA_OUTBOUND_ENABLED:-0}
      MANDALA_OTLP_ENDPOINT: ${MANDALA_OTLP_ENDPOINT:-}
    depends_on:
      redis: { condition: service_healthy }

  # --- Optional: Redis HA with Sentinel (profile: ha) --------------------
  # Adds a Redis replica and 3 Sentinel instances for automatic failover.
  # For self-hosted operators who need HA without AWS ElastiCache.
  #   docker compose --profile ha up
  redis-replica:
    profiles: ["ha"]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--replicaof", "redis", "6379"]
    volumes: [redis-replica-data:/data]
    depends_on:
      redis: { condition: service_healthy }

  redis-sentinel-1:
    profiles: ["ha"]
    image: redis:7-alpine
    command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
    volumes:
      - ./deploy/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis: { condition: service_healthy }

  redis-sentinel-2:
    profiles: ["ha"]
    image: redis:7-alpine
    command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
    volumes:
      - ./deploy/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis: { condition: service_healthy }

  redis-sentinel-3:
    profiles: ["ha"]
    image: redis:7-alpine
    command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
    volumes:
      - ./deploy/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis: { condition: service_healthy }

  # --- Optional: OpenTelemetry collector (profile: otel) -----------------
  # Routes Mandala spans to any OTLP-compatible backend (Jaeger, Tempo,
  # Honeycomb, Datadog, Grafana Cloud). ~50MB RAM, fully opt-in.
  #   docker compose --profile otel up
  otel-collector:
    profiles: ["otel", "all"]
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    restart: unless-stopped

  # --- Optional: Local trace UI (profile: traces) ------------------------
  # Jaeger all-in-one for local debugging. ~200MB RAM.
  #   docker compose --profile traces up
  jaeger:
    profiles: ["traces", "all"]
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # collector gRPC
    restart: unless-stopped

volumes:
  redis-data:
  redis-replica-data:
