services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: ["uvicorn", "mandala.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_SAMSARA_WEBHOOK_SECRET: ${MANDALA_SAMSARA_WEBHOOK_SECRET:-dev-secret}
      MANDALA_DESCARTES_WEBHOOK_SECRET: ${MANDALA_DESCARTES_WEBHOOK_SECRET:-dev-secret}
      MANDALA_SAMSARA_API_TOKEN: ${MANDALA_SAMSARA_API_TOKEN:-}
      MANDALA_SAMSARA_OUTBOUND_ENABLED: ${MANDALA_SAMSARA_OUTBOUND_ENABLED:-0}
      MANDALA_DESCARTES_API_KEY: ${MANDALA_DESCARTES_API_KEY:-}
    ports: ["8000:8000"]
    depends_on:
      redis: { condition: service_healthy }

  worker:
    build: .
    command: ["mandala", "worker"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_SAMSARA_API_TOKEN: ${MANDALA_SAMSARA_API_TOKEN:-}
      MANDALA_SAMSARA_OUTBOUND_ENABLED: ${MANDALA_SAMSARA_OUTBOUND_ENABLED:-0}
    depends_on:
      redis: { condition: service_healthy }

  palantir-connector:
    build: .
    command: ["python", "palantir/stub_connector.py"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_PALANTIR_ENABLED: ${MANDALA_PALANTIR_ENABLED:-0}
      MANDALA_PALANTIR_API_URL: ${MANDALA_PALANTIR_API_URL:-}
      MANDALA_PALANTIR_TOKEN: ${MANDALA_PALANTIR_TOKEN:-}
      MANDALA_PALANTIR_BATCH_SIZE: ${MANDALA_PALANTIR_BATCH_SIZE:-100}
      MANDALA_PALANTIR_FLUSH_INTERVAL_SEC: ${MANDALA_PALANTIR_FLUSH_INTERVAL_SEC:-30}
    depends_on:
      redis: { condition: service_healthy }
    profiles:
      - palantir

  kinaxis-connector:
    build: .
    command: ["python", "kinaxis/connector.py"]
    environment:
      MANDALA_REDIS_URL: redis://redis:6379/0
      MANDALA_KINAXIS_ENABLED: ${MANDALA_KINAXIS_ENABLED:-0}
      MANDALA_KINAXIS_API_URL: ${MANDALA_KINAXIS_API_URL:-}
      MANDALA_KINAXIS_API_KEY: ${MANDALA_KINAXIS_API_KEY:-}
      MANDALA_KINAXIS_BATCH_SIZE: ${MANDALA_KINAXIS_BATCH_SIZE:-50}
      MANDALA_KINAXIS_FLUSH_INTERVAL_SEC: ${MANDALA_KINAXIS_FLUSH_INTERVAL_SEC:-30}
    depends_on:
      redis: { condition: service_healthy }
    profiles:
      - kinaxis

volumes:
  redis-data:
