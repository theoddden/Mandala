# Default values for Mandala

image:
  repository: theoddden/mandala
  tag: latest
  pullPolicy: IfNotPresent

replicas:
  api: 2
  worker: 3

redis:
  image: redis:7-alpine
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

api:
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  env:
    redisUrl: "redis://redis:6379/0"
    samsaraOutboundEnabled: "1"
    alertRoutingEnabled: "0"
    alertAggregationEnabled: "1"

worker:
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m
  env:
    redisUrl: "redis://redis:6379/0"
    samsaraOutboundEnabled: "1"
    alertRoutingEnabled: "0"
    alertAggregationEnabled: "1"
    metricsEnabled: "1"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mandala.yourdomain.com
      paths:
        - path: /webhooks/samsara
          pathType: Prefix
  tls:
    - secretName: mandala-tls
      hosts:
        - mandala.yourdomain.com

secrets:
  samsaraWebhookSecret: ""
  samsaraApiToken: ""
  alertSlackWebhookUrl: ""
  alertSmtpUser: ""
  alertSmtpPassword: ""
  alertPagerdutyRoutingKey: ""
  datClientId: ""
  datClientSecret: ""
  truckstopIntegrationId: ""
  truckstopUsername: ""
  truckstopPassword: ""
  vizionApiKey: ""

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
